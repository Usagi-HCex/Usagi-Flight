# Copy this file to an untracked wrangler.toml when deploying
# this app as a Cloudflare Worker with Workers Static Assets.
# Keep real account IDs, database IDs, and secrets out of Git.

name = "flight-log-api"
main = "workers/api-assets-router.js"
compatibility_date = "2026-06-03"
keep_vars = true

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "your-d1-database-name"
database_id = "your-d1-database-id"
